---
name: AI Agent Tools

on:
  push:
    branches:
      - "ai/**"
    paths:
      - "tools/ai-agent/**"
      - "docs/ai-agent/**"
      - ".github/workflows/ai-agent-tools.yml"
  pull_request:
    paths:
      - "tools/ai-agent/**"
      - "docs/ai-agent/**"
      - ".github/workflows/ai-agent-tools.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-tools:
    name: Validate AI agent tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tools/ai-agent -p "test_*.py" -v

      - name: Generate identifier registry
        run: python tools/ai-agent/scan_ids.py --root . --output artifacts/ID_REGISTRY.json

      - name: Generate project structure index
        run: python tools/ai-agent/scan_project.py --root . --output artifacts/PROJECT_STRUCTURE.json

      - name: Generate gameplay content index
        run: python tools/ai-agent/scan_content.py --root . --output artifacts/CONTENT_INDEX.json

      - name: Validate gameplay references
        run: |
          python tools/ai-agent/validate_references.py \
            --content artifacts/CONTENT_INDEX.json \
            --registry artifacts/ID_REGISTRY.json \
            --output artifacts/REFERENCE_REPORT.json

      - name: Generate prioritized risk report
        run: |
          python tools/ai-agent/generate_risk_report.py \
            --registry artifacts/ID_REGISTRY.json \
            --content artifacts/CONTENT_INDEX.json \
            --references artifacts/REFERENCE_REPORT.json \
            --output artifacts/RISK_REPORT.md \
            --max-items 50

      - name: Validate content authoring schemas
        run: |
          python -m json.tool docs/ai-agent/TASK_SPEC.schema.json > /dev/null
          python -m json.tool docs/ai-agent/ID_RESERVATIONS.schema.json > /dev/null
          python -m json.tool docs/ai-agent/ID_RESERVATIONS.json > /dev/null
          python -m json.tool docs/ai-agent/examples/forgotten_forge.content-bundle.json > /dev/null

      - name: Run first realistic content pack
        run: |
          cp docs/ai-agent/ID_RESERVATIONS.json artifacts/ID_RESERVATIONS.ci.json
          python tools/ai-agent/run_content_pipeline.py \
            --task docs/ai-agent/examples/forgotten_forge.content-bundle.json \
            --registry artifacts/ID_REGISTRY.json \
            --content-index artifacts/CONTENT_INDEX.json \
            --reservations artifacts/ID_RESERVATIONS.ci.json \
            --output artifacts/first-real-content-pack

      - name: Validate generated JSON
        run: |
          python -m json.tool artifacts/ID_REGISTRY.json > /dev/null
          python -m json.tool artifacts/PROJECT_STRUCTURE.json > /dev/null
          python -m json.tool artifacts/CONTENT_INDEX.json > /dev/null
          python -m json.tool artifacts/REFERENCE_REPORT.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/TASK_SPEC.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/TASK_SPEC_VALIDATION.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/CONTENT_PLAN.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/CONTENT_PLAN_VALIDATION.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/ID_RESERVATIONS.working.json > /dev/null
          python -m json.tool artifacts/first-real-content-pack/generated-content/forgotten_forge_bundle/MANIFEST.json > /dev/null

      - name: Verify first content pack outputs
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("artifacts/first-real-content-pack")
          generated = root / "generated-content/forgotten_forge_bundle"
          plan = json.loads((root / "CONTENT_PLAN.json").read_text(encoding="utf-8"))
          validation = json.loads((root / "CONTENT_PLAN_VALIDATION.json").read_text(encoding="utf-8"))
          reservations = json.loads((root / "ID_RESERVATIONS.working.json").read_text(encoding="utf-8"))
          manifest = json.loads((generated / "MANIFEST.json").read_text(encoding="utf-8"))
          provenance = (root / "RESEARCH_PROVENANCE.md").read_text(encoding="utf-8")

          assert validation["ok"] is True
          assert len(plan["componentPlan"]) == 3
          assert len(manifest["files"]) == 3
          assert manifest["format"] == "canary-preview-v1"
          assert len([item for item in reservations["reservations"] if item["taskId"] == "forgotten_forge_bundle"]) == 5
          assert "custom OTS design, not canonical Tibia content" in provenance
          assert "https://tibia.fandom.com/wiki/" in provenance

          quest = (generated / "quest/forgotten_forge.lua").read_text(encoding="utf-8")
          npc = (generated / "npc/forge_keeper_ardan.lua").read_text(encoding="utf-8")
          monster = (generated / "monster/the_ashen_sentinel.lua").read_text(encoding="utf-8")
          assert "return quest" in quest
          assert "Game.createNpcType" in npc and "npcType:register" in npc
          assert "Game.createMonsterType" in monster and "mType:register" in monster

      - name: Create audit summary
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          registry = json.loads(Path("artifacts/ID_REGISTRY.json").read_text(encoding="utf-8"))
          structure = json.loads(Path("artifacts/PROJECT_STRUCTURE.json").read_text(encoding="utf-8"))
          content = json.loads(Path("artifacts/CONTENT_INDEX.json").read_text(encoding="utf-8"))
          references = json.loads(Path("artifacts/REFERENCE_REPORT.json").read_text(encoding="utf-8"))
          pack = json.loads(Path("artifacts/first-real-content-pack/CONTENT_PLAN.json").read_text(encoding="utf-8"))
          task = json.loads(Path("artifacts/first-real-content-pack/TASK_SPEC.json").read_text(encoding="utf-8"))

          lines = ["# AI agent repository audit", "", "## Identifier registry", ""]
          for name, data in registry["namespaces"].items():
              lines.append(f"- {name}: {len(data['entries'])}")
          lines.append(f"- potential definition conflicts: {len(registry['conflicts'])}")
          lines.extend(["", "## Project structure", "", f"- files: {structure['summary']['fileCount']}", f"- total bytes: {structure['summary']['totalBytes']}"])
          for name, count in structure["summary"]["categoryCounts"].items():
              lines.append(f"- {name}: {count}")

          lines.extend(["", "## Gameplay content", ""])
          for name, count in content["summary"]["countsByType"].items():
              lines.append(f"- {name}: {count}")
          lines.append(f"- duplicate definitions: {content['summary']['duplicateDefinitions']}")
          lines.append(f"- cross-datapack duplicates: {content['summary'].get('crossDatapackDuplicates', 0)}")

          lines.extend(["", "## Reference validation", ""])
          lines.append(f"- findings: {references['summary']['findingCount']}")
          for name, count in references["summary"]["countsByType"].items():
              lines.append(f"- {name}: {count}")

          lines.extend(["", "## First realistic content pack", ""])
          lines.append(f"- components: {len(pack['componentPlan'])}")
          lines.append(f"- preview files: {len(pack['newFiles'])}")
          lines.append(f"- declared sources: {len(task.get('sources', []))}")
          lines.append(f"- storage IDs: {len(pack['proposedStorage'])}")
          lines.append(f"- action IDs: {len(pack['proposedActionIds'])}")
          lines.append(f"- risk level: {pack['riskLevel']}")
          lines.append("- preview format: canary-preview-v1")

          report = "\n".join(lines) + "\n"
          Path("artifacts/AI_AGENT_AUDIT_SUMMARY.md").write_text(report, encoding="utf-8")
          risk = Path("artifacts/RISK_REPORT.md").read_text(encoding="utf-8")
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(report + "\n" + risk, encoding="utf-8")

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-project-audit
          path: |
            artifacts/ID_REGISTRY.json
            artifacts/PROJECT_STRUCTURE.json
            artifacts/CONTENT_INDEX.json
            artifacts/REFERENCE_REPORT.json
            artifacts/RISK_REPORT.md
            artifacts/AI_AGENT_AUDIT_SUMMARY.md

      - name: Upload first realistic content pack
        uses: actions/upload-artifact@v4
        with:
          name: first-real-content-pack
          path: |
            docs/ai-agent/examples/forgotten_forge.content-bundle.json
            artifacts/first-real-content-pack/TASK_SPEC.json
            artifacts/first-real-content-pack/TASK_SPEC_VALIDATION.json
            artifacts/first-real-content-pack/CONTENT_PLAN.json
            artifacts/first-real-content-pack/CONTENT_PLAN_VALIDATION.json
            artifacts/first-real-content-pack/ID_RESERVATIONS.working.json
            artifacts/first-real-content-pack/RESEARCH_PROVENANCE.md
            artifacts/first-real-content-pack/generated-content/**
            artifacts/first-real-content-pack/CONTENT_PIPELINE_SUMMARY.md
            artifacts/RISK_REPORT.md
          if-no-files-found: error
          retention-days: 14
