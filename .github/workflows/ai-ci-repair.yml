---
name: AI CI Repair

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Failed CI workflow run ID
        required: true
        type: string
      pr_number:
        description: Pull request number associated with the failed run
        required: true
        type: string
      branch:
        description: Expected same-repository pull request branch
        required: true
        type: string

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: ai-ci-repair-${{ inputs.run_id }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository without write credentials
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate failed run and check out its exact commit
        id: failed-run
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_BRANCH: ${{ inputs.branch }}
        shell: bash
        run: |
          set -euo pipefail

          run_json=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID")
          conclusion=$(jq -r '.conclusion' <<< "$run_json")
          event=$(jq -r '.event' <<< "$run_json")
          head_repo=$(jq -r '.head_repository.full_name' <<< "$run_json")
          head_branch=$(jq -r '.head_branch' <<< "$run_json")
          head_sha=$(jq -r '.head_sha' <<< "$run_json")

          test "$conclusion" = "failure"
          test "$event" = "pull_request"
          test "$head_repo" = "$GITHUB_REPOSITORY"
          test "$head_branch" = "$EXPECTED_BRANCH"
          jq -e --argjson number "$PR_NUMBER" \
            'any(.pull_requests[]?; .number == $number)' <<< "$run_json" >/dev/null

          pr_json=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")
          test "$(jq -r '.state' <<< "$pr_json")" = "open"
          test "$(jq -r '.head.repo.full_name' <<< "$pr_json")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.head.ref' <<< "$pr_json")" = "$EXPECTED_BRANCH"

          git fetch origin "$head_sha" --quiet
          git checkout --detach "$head_sha"
          test "$(git rev-parse HEAD)" = "$head_sha"

          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Diagnosing failed SHA $head_sha; the PR branch will not be modified." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Download failed CI logs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Failed run ID: $RUN_ID"
            echo "Failed head SHA: ${{ steps.failed-run.outputs.head_sha }}"
            echo
            gh run view "$RUN_ID" --log-failed
          } > ci-failure.log
          test -s ci-failure.log

      - name: Prepare a proposed repair with Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/repair-ci.md
          sandbox: workspace-write
          effort: high
          output-file: codex-output.md
          codex-args: '["--ephemeral"]'

      - name: Validate and package the proposal
        id: proposal
        shell: bash
        run: |
          set -euo pipefail

          cp codex-output.md /tmp/codex-output.md
          rm -f ci-failure.log codex-output.md

          untracked=$(git ls-files --others --exclude-standard)
          if [ -n "$untracked" ]; then
            while IFS= read -r path; do
              git add -N -- "$path"
            done <<< "$untracked"
          fi

          changed=$({ git diff --name-only; git ls-files --others --exclude-standard; } \
            | sort -u)
          if [ -z "$changed" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Codex proposed no source changes." >> "$GITHUB_STEP_SUMMARY"
            cp /tmp/codex-output.md codex-output.md
            exit 0
          fi

          protected='^(\.github/workflows/|\.github/CODEOWNERS$|SECURITY\.md$|\.github/dependabot\.yml$)'
          if grep -Eq "$protected" <<< "$changed"; then
            echo "Codex attempted to modify protected files:" >&2
            grep -E "$protected" <<< "$changed" >&2
            exit 1
          fi

          printf '%s\n' "$changed" > changed-files.txt
          git diff --binary -- . > ai-ci-repair.patch
          test -s ai-ci-repair.patch
          cp /tmp/codex-output.md codex-output.md

          echo "present=true" >> "$GITHUB_OUTPUT"
          {
            echo "### Proposed files"
            echo '```text'
            cat changed-files.txt
            echo '```'
            echo
            echo "No commit was created and no pull-request branch was modified."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proposed repair for human review
        if: steps.proposal.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-ci-repair-${{ inputs.run_id }}
          path: |
            ai-ci-repair.patch
            changed-files.txt
            codex-output.md
          if-no-files-found: error
          retention-days: 14

      - name: Comment diagnostic result on pull request
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_ID: ${{ inputs.run_id }}
          HAS_PROPOSAL: ${{ steps.proposal.outputs.present }}
        shell: bash
        run: |
          if [ "$HAS_PROPOSAL" = "true" ]; then
            body="### AI CI Repair diagnostic

A proposed patch was generated from failed run \`$RUN_ID\` and uploaded as the \`ai-ci-repair-$RUN_ID\` workflow artifact.

**No commit was created and the PR branch was not modified.** Review and apply the patch manually only after confirming its scope."
          else
            body="### AI CI Repair diagnostic

No source-code patch was generated for failed run \`$RUN_ID\`.

**No commit was created and the PR branch was not modified.**"
          fi
          gh pr comment "$PR_NUMBER" --body "$body"
