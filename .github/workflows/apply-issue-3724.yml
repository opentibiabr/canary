name: Apply issue 3724 fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-issue-3724.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'fix/issue-3724-gem-persistence'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply focused fix
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/creatures/players/components/wheel/player_wheel.cpp')
          text = path.read_text()

          old_destroy = '''\tm_destroyedGems.emplace_back(gem);\n\tm_revealedGems.erase(m_revealedGems.begin() + index);'''
          new_destroy = '''\tconst auto destroyedGemUuid = gem.uuid;\n\tconst auto destroyedGemAffinity = gem.affinity;\n\tm_destroyedGems.emplace_back(gem);\n\tgem.remove(gemsKV());\n\n\tauto &activeGem = m_activeGems[static_cast<uint8_t>(destroyedGemAffinity)];\n\tif (activeGem && activeGem.uuid == destroyedGemUuid) {\n\t\tremoveActiveGem(destroyedGemAffinity);\n\t\tgemsKV()->scoped("active")->remove(std::string(magic_enum::enum_name(destroyedGemAffinity)));\n\t}\n\n\tm_revealedGems.erase(m_revealedGems.begin() + index);'''
          if old_destroy not in text:
              raise SystemExit('destroyGem target block not found')
          text = text.replace(old_destroy, new_destroy, 1)

          old_active = '''void PlayerWheel::setActiveGem(WheelGemAffinity_t affinity, uint16_t index) {\n\tauto &gem = getGem(index);'''
          new_active = '''void PlayerWheel::setActiveGem(WheelGemAffinity_t affinity, uint16_t index) {\n\tif (index >= m_revealedGems.size()) {\n\t\tg_logger().error(\n\t\t\t"[{}] Player {} tried to activate gem {} but only has {} revealed gems",\n\t\t\t__FUNCTION__, m_player.getName(), index, m_revealedGems.size()\n\t\t);\n\t\tremoveActiveGem(affinity);\n\t\treturn;\n\t}\n\n\tauto &gem = m_revealedGems[index];'''
          if old_active not in text:
              raise SystemExit('setActiveGem target block not found')
          text = text.replace(old_active, new_active, 1)

          path.write_text(text)
      - name: Remove helper workflow and commit
        run: |
          rm .github/workflows/apply-issue-3724.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/creatures/players/components/wheel/player_wheel.cpp .github/workflows/apply-issue-3724.yml
          git commit -m "fix: persist destroyed active gems"
          git push origin HEAD:${{ github.head_ref }}
