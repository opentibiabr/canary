---
name: Gameplay Analytics

on:
  pull_request:
    paths:
      - "data-otservbr-global/scripts/config/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics_reliability.lua"
      - "data-otservbr-global/scripts/systems/gameplay_analytics.lua"
      - "schema/gameplay_analytics.sql"
      - "docs/systems/gameplay-analytics.md"
      - "tools/analytics/test_gameplay_analytics_reliability.lua"
      - "tools/analytics/test_mariadb_integration.sh"
      - "tools/analytics/test_validate_gameplay_analytics.py"
      - "tools/analytics/test_validate_gameplay_analytics_reliability.py"
      - "tools/analytics/validate_gameplay_analytics.py"
      - "tools/analytics/validate_gameplay_analytics_reliability.py"
      - ".github/workflows/gameplay-analytics.yml"
  push:
    branches: [main]
    paths:
      - "data-otservbr-global/scripts/config/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics_reliability.lua"
      - "data-otservbr-global/scripts/systems/gameplay_analytics.lua"
      - "schema/gameplay_analytics.sql"
      - "docs/systems/gameplay-analytics.md"
      - "tools/analytics/test_gameplay_analytics_reliability.lua"
      - "tools/analytics/test_mariadb_integration.sh"
      - "tools/analytics/test_validate_gameplay_analytics.py"
      - "tools/analytics/test_validate_gameplay_analytics_reliability.py"
      - "tools/analytics/validate_gameplay_analytics.py"
      - "tools/analytics/validate_gameplay_analytics_reliability.py"
      - ".github/workflows/gameplay-analytics.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate gameplay analytics contract
        run: python tools/analytics/validate_gameplay_analytics.py
      - name: Validate gameplay analytics reliability contract
        run: python tools/analytics/validate_gameplay_analytics_reliability.py
      - name: Run gameplay analytics validator tests
        run: python -m unittest discover -s tools/analytics -p "test_*.py" -v
      - name: Run gameplay analytics Lua reliability test
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit
          luajit tools/analytics/test_gameplay_analytics_reliability.lua
      - name: Parse SQL schema
        run: |
          python - <<'PY'
          from pathlib import Path
          sql = Path('schema/gameplay_analytics.sql').read_text(encoding='utf-8')
          assert sql.count('CREATE TABLE IF NOT EXISTS') == 7
          assert sql.count('ENGINE=InnoDB') == 7
          print('SQL schema structure passed')
          PY

  mariadb-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: canary_test
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client
      - name: Test schema and idempotent persistence
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: canary_test
        run: |
          set -o pipefail
          bash tools/analytics/test_mariadb_integration.sh 2>&1 | tee mariadb-integration.log
      - name: Upload MariaDB integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-analytics-mariadb-log
          path: mariadb-integration.log
          if-no-files-found: error
          retention-days: 7
