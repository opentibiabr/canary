---
name: OTBM Map Tools

on:
  push:
    branches:
      - "feat/otbm-*"
      - "fix/otbm-*"
    paths:
      - "tools/ai-agent/otbm_*.py"
      - "tools/ai-agent/test_otbm_*.py"
      - "docs/ai-agent/OTBM_*.md"
      - "docs/ai-agent/OTBM_*.json"
      - ".github/workflows/otbm-map-tools.yml"
  pull_request:
    paths:
      - "tools/ai-agent/otbm_*.py"
      - "tools/ai-agent/test_otbm_*.py"
      - "docs/ai-agent/OTBM_*.md"
      - "docs/ai-agent/OTBM_*.json"
      - ".github/workflows/otbm-map-tools.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-otbm-tools:
    name: Validate OTBM map tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate OTBM schema JSON
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          schemas=(docs/ai-agent/OTBM_*.schema.json)
          if (( ${#schemas[@]} == 0 )); then
            echo "No OTBM schemas found" >&2
            exit 1
          fi
          for schema in "${schemas[@]}"; do
            echo "Validating ${schema}"
            python -m json.tool "${schema}" > /dev/null
          done

      - name: Run focused OTBM tests
        id: otbm-tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          python -m unittest discover -s tools/ai-agent -p "test_otbm_*.py" -v 2>&1 | tee artifacts/OTBM_TESTS.log

      - name: Upload OTBM test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otbm-map-tool-tests
          path: artifacts/OTBM_TESTS.log
          if-no-files-found: error
          retention-days: 14
