---
name: Publish ARM64 Container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to build and publish.
        required: true
        type: string

concurrency:
  group: publish-arm64-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish linux/arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Resolve image metadata
        id: metadata
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.arm
          platforms: linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.image }}:${{ steps.metadata.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.tag }}
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
          secrets: |
            github_token=${{ github.token }}
          cache-from: type=gha,scope=canary-arm64
          cache-to: type=gha,mode=max,scope=canary-arm64

      - name: Publish summary
        env:
          IMAGE: ${{ steps.metadata.outputs.image }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: echo "Published ${IMAGE}:${TAG} for linux/arm64." >> "$GITHUB_STEP_SUMMARY"
