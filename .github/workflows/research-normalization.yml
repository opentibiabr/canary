name: Research Normalization

on:
  push:
    branches:
      - "ai/**"
    paths:
      - "tools/ai-agent/normalize_research.py"
      - "tools/ai-agent/research_to_task.py"
      - "tools/ai-agent/run_research_pipeline.py"
      - "tools/ai-agent/evaluate_promotion_readiness.py"
      - "tools/ai-agent/build_promotion_handoff.py"
      - "tools/ai-agent/generate_staging_patch.py"
      - "tools/ai-agent/verify_staging_patch.py"
      - "tools/ai-agent/test_research_normalization.py"
      - "tools/ai-agent/test_research_to_task.py"
      - "tools/ai-agent/test_research_pipeline.py"
      - "tools/ai-agent/test_promotion_readiness.py"
      - "tools/ai-agent/test_promotion_handoff.py"
      - "tools/ai-agent/test_staging_patch.py"
      - "tools/ai-agent/test_staging_patch_verifier.py"
      - "docs/ai-agent/RESEARCH_ENTITY.schema.json"
      - "docs/ai-agent/examples/*.research.json"
      - ".github/workflows/research-normalization.yml"
  pull_request:
    paths:
      - "tools/ai-agent/normalize_research.py"
      - "tools/ai-agent/research_to_task.py"
      - "tools/ai-agent/run_research_pipeline.py"
      - "tools/ai-agent/evaluate_promotion_readiness.py"
      - "tools/ai-agent/build_promotion_handoff.py"
      - "tools/ai-agent/generate_staging_patch.py"
      - "tools/ai-agent/verify_staging_patch.py"
      - "tools/ai-agent/test_research_normalization.py"
      - "tools/ai-agent/test_research_to_task.py"
      - "tools/ai-agent/test_research_pipeline.py"
      - "tools/ai-agent/test_promotion_readiness.py"
      - "tools/ai-agent/test_promotion_handoff.py"
      - "tools/ai-agent/test_staging_patch.py"
      - "tools/ai-agent/test_staging_patch_verifier.py"
      - "docs/ai-agent/RESEARCH_ENTITY.schema.json"
      - "docs/ai-agent/examples/*.research.json"
      - ".github/workflows/research-normalization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run research pipeline tests
        run: |
          python -m unittest tools/ai-agent/test_research_normalization.py -v
          python -m unittest tools/ai-agent/test_research_to_task.py -v
          python -m unittest tools/ai-agent/test_research_pipeline.py -v
          python -m unittest tools/ai-agent/test_promotion_readiness.py -v
          python -m unittest tools/ai-agent/test_promotion_handoff.py -v
          python -m unittest tools/ai-agent/test_staging_patch.py -v
          python -m unittest tools/ai-agent/test_staging_patch_verifier.py -v

      - name: Validate research JSON files
        run: |
          python -m json.tool docs/ai-agent/RESEARCH_ENTITY.schema.json > /dev/null
          python -m json.tool docs/ai-agent/examples/dragon.research.json > /dev/null
          python -m json.tool docs/ai-agent/examples/forgotten_forge.research.json > /dev/null

      - name: Build repository indexes
        run: |
          python tools/ai-agent/scan_content.py --root . --output artifacts/CONTENT_INDEX.json
          python tools/ai-agent/scan_ids.py --root . --output artifacts/ID_REGISTRY.json
          cp docs/ai-agent/ID_RESERVATIONS.json artifacts/ID_RESERVATIONS.research.json

      - name: Run conflict-free research pipeline end to end
        run: |
          python tools/ai-agent/run_research_pipeline.py \
            --research docs/ai-agent/examples/forgotten_forge.research.json \
            --registry artifacts/ID_REGISTRY.json \
            --content-index artifacts/CONTENT_INDEX.json \
            --reservations artifacts/ID_RESERVATIONS.research.json \
            --repository-root . \
            --output artifacts/research-pipeline-ready

      - name: Verify conflict blocks the one-command pipeline
        shell: bash
        run: |
          set +e
          python tools/ai-agent/run_research_pipeline.py \
            --research docs/ai-agent/examples/dragon.research.json \
            --registry artifacts/ID_REGISTRY.json \
            --content-index artifacts/CONTENT_INDEX.json \
            --reservations artifacts/ID_RESERVATIONS.research.json \
            --repository-root . \
            --output artifacts/research-pipeline-conflict
          status=$?
          set -e
          test "$status" -eq 2

      - name: Verify end-to-end outputs
        shell: python
        run: |
          import json
          from pathlib import Path

          ready = Path("artifacts/research-pipeline-ready")
          result = json.loads((ready / "RESEARCH_PIPELINE_RESULT.json").read_text(encoding="utf-8"))
          task = json.loads((ready / "TASK_SPEC.generated.json").read_text(encoding="utf-8"))
          validation = json.loads((ready / "CONTENT_PLAN_VALIDATION.json").read_text(encoding="utf-8"))
          readiness = json.loads((ready / "PROMOTION_READINESS.json").read_text(encoding="utf-8"))
          readiness_md = (ready / "PROMOTION_READINESS.md").read_text(encoding="utf-8")
          handoff = json.loads((ready / "PROMOTION_HANDOFF.json").read_text(encoding="utf-8"))
          handoff_md = (ready / "PROMOTION_HANDOFF.md").read_text(encoding="utf-8")
          staging = json.loads((ready / "STAGING_PATCH_PLAN.json").read_text(encoding="utf-8"))
          patch = (ready / "STAGING_CONTENT.patch").read_text(encoding="utf-8")
          manifest = json.loads(
              (ready / "generated-content" / task["taskId"] / "MANIFEST.json").read_text(encoding="utf-8")
          )

          assert result["ok"] is True
          assert result["stage"] == "complete"
          assert result["generatedComponents"] == 3
          assert result["previewFiles"] == 3
          assert result["reservedIdentifiers"] == 5
          assert result["promotionStatus"] == "not-ready"
          assert result["promotionBlockers"] > 0
          assert result["handoffStatus"] == "blocked"
          assert result["handoffFiles"] == 3
          assert result["stagingPatchStatus"] == "blocked"
          assert result["stagingPatchGenerated"] is False
          assert result["stagingPatchBlockers"] > 0
          assert result["automaticPromotionAllowed"] is False
          assert result["automaticApplyAllowed"] is False
          assert validation["ok"] is True
          assert manifest["format"] == "canary-preview-v1"
          assert task["dryRun"] is True
          assert readiness["readyForHumanPromotion"] is False
          assert readiness["automaticPromotionAllowed"] is False
          assert readiness["manualApprovalRequired"] is True
          assert "automatic promotion: forbidden" in readiness_md
          assert "storage-constants" in {item["category"] for item in readiness["findings"]}
          assert "map" in {item["category"] for item in readiness["findings"]}
          assert handoff["automaticApplyAllowed"] is False
          assert handoff["manualApprovalRequired"] is True
          assert len(handoff["files"]) == 3
          assert all(item["targetPath"].startswith("data-otservbr-global/") for item in handoff["files"])
          assert "automatic apply: forbidden" in handoff_md
          assert "production server" in handoff["prohibitedAutomaticTargets"]
          assert staging["automaticApplyAllowed"] is False
          assert staging["manualApprovalRequired"] is True
          assert staging["patchGenerated"] is False
          assert patch == ""
          assert "main" in staging["prohibitedAutomaticTargets"]

          blocked = Path("artifacts/research-pipeline-conflict")
          blocked_result = json.loads((blocked / "RESEARCH_PIPELINE_RESULT.json").read_text(encoding="utf-8"))
          conflicts = json.loads((blocked / "RESEARCH_CONFLICTS.json").read_text(encoding="utf-8"))
          assert blocked_result["ok"] is False
          assert blocked_result["stage"] == "conflict-check"
          assert blocked_result["blockedConflicts"] >= 1
          assert conflicts["summary"]["readyForPipeline"] is False
          assert not (blocked / "CONTENT_PLAN.json").exists()
          assert not (blocked / "generated-content").exists()
          assert not (blocked / "PROMOTION_READINESS.json").exists()
          assert not (blocked / "PROMOTION_HANDOFF.json").exists()
          assert not (blocked / "STAGING_PATCH_PLAN.json").exists()

      - uses: actions/upload-artifact@v4
        with:
          name: end-to-end-research-pipeline
          path: |
            artifacts/CONTENT_INDEX.json
            artifacts/ID_REGISTRY.json
            artifacts/research-pipeline-ready/**
            artifacts/research-pipeline-conflict/**
          if-no-files-found: error
          retention-days: 14
