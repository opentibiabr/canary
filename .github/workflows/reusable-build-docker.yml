name: Reusable Docker Build

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.15
        with:
          versionSpec: "5.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.15

      - name: Convert repository name to lowercase
        id: repo_lower
        run: |
          echo "value=${REPO,,}" >> $GITHUB_OUTPUT
        env:
          REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.x86
          push: true
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_MODE=readwrite
          secrets: |
            github_token=${{ github.token }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.value }}:latest
            ghcr.io/${{ steps.repo_lower.outputs.value }}:${{ steps.gitversion.outputs.semVer }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and export (PR)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.x86
          push: false
          outputs: type=local,dest=artifacts/docker-rootfs
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_MODE=read
          secrets: |
            github_token=${{ github.token }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.value }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload docker artifact
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: docker-canary
          path: artifacts/docker-rootfs/bin/canary
