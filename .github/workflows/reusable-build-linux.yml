name: Reusable Linux Build

on:
  workflow_call:
    inputs:
      buildtypes:
        description: JSON array of Linux build presets to compile.
        required: false
        type: string
        default: '["linux-release","linux-debug"]'
      run_canary_smoke:
        description: Run the data-canary runtime smoke test.
        required: false
        type: boolean
        default: true
      run_global_smoke:
        description: Run the data-otservbr-global runtime smoke test.
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Compile (${{ matrix.buildtype }})
    strategy:
      fail-fast: false
      matrix:
        buildtype: ${{ fromJSON(inputs.buildtypes) }}
    runs-on: ubuntu-24.04
    env:
      CC: gcc-13
      CXX: g++-13
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'readwrite' || 'read' }};nugettimeout,600"
      VCPKG_NUGET_API_KEY: ${{ secrets.VCPKG_PACKAGES_TOKEN || github.token }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: canary_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get vcpkg baseline
        id: vcpkg-baseline
        shell: bash
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "VCPKG_GIT_COMMIT_ID=$vcpkgCommitId" >> "$GITHUB_ENV"

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache ninja-build gcc-13 g++-13 mysql-client
          # Ensure ninja is in the path and named correctly
          sudo ln -sf /usr/bin/ninja /usr/bin/ninja-build
          ninja --version

      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          max-size: "1G"
          key: ccache-linux-${{ matrix.buildtype }}
          restore-keys: |
            ccache-linux

      - name: Install mono for NuGet
        run: sudo apt-get update && sudo apt-get install -y mono-complete

      - name: Setup NuGet for vcpkg
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.VCPKG_PACKAGES_TOKEN || github.token }}
        run: |
          unset VCPKG_FORCE_SYSTEM_BINARIES
          NUGET_PATH=$(vcpkg fetch nuget | tail -n 1)
          mono "$NUGET_PATH" sources add \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            -storepasswordincleartext \
            -name "GitHubPackages" \
            -username "${{ github.repository_owner }}" \
            -password "${NUGET_AUTH_TOKEN}"
          mono "$NUGET_PATH" setapikey "${NUGET_AUTH_TOKEN}" \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.buildtype }}
          buildPreset: ${{ matrix.buildtype }}
          configurePresetAdditionalArgs: "['-DTOGGLE_BIN_FOLDER=ON','-DOPTIONS_ENABLE_CCACHE=ON','-DOPTIONS_ENABLE_SCCACHE=OFF']"

      - name: Check generated Lua API docs are current
        if: matrix.buildtype == 'linux-release'
        shell: bash
        env:
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          build/${{ matrix.buildtype }}/bin/canary --generate-lua-api-docs-only
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "$PR_HEAD_REPO" == "$CURRENT_REPO" ]]; then
            if [[ ! "$PR_HEAD_REF" =~ ^[-A-Za-z0-9_./]+$ ]]; then
              echo "Unsafe pull request branch name: $PR_HEAD_REF" >&2
              exit 1
            fi
            if ! git diff --quiet -- docs/lua-api; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add docs/lua-api
              git commit -m "ci(lua-docs): regenerate lua api docs"
              if ! git push origin "HEAD:$PR_HEAD_REF"; then
                echo "Initial docs push failed, retrying after fetch/rebase..."
                git fetch origin "$PR_HEAD_REF"
                git rebase "origin/$PR_HEAD_REF"
                if ! git push origin "HEAD:$PR_HEAD_REF"; then
                  echo "Docs push still failed after retry (likely concurrent push). Continuing without failing this step."
                fi
              fi
            fi
          fi
          git diff --exit-code -- docs/lua-api

      - name: Smoke test Canary datapack runtime
        if: inputs.run_canary_smoke
        shell: bash
        run: |
          set -euo pipefail
          binary_path="build/${{ matrix.buildtype }}/bin/canary"
          if [[ "${{ matrix.buildtype }}" == "linux-debug" ]]; then
            binary_path="build/${{ matrix.buildtype }}/bin/canary-debug"
          fi

          python3 .github/scripts/smoke_test_canary.py \
            --binary-path "${binary_path}" \
            --data-pack data-canary \
            --map-name canary \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --db-user root \
            --db-password root \
            --db-name canary_smoke_${{ matrix.buildtype }}_canary \
            --login-port 7271 \
            --game-port 7272 \
            --status-port 7271 \
            --startup-timeout-seconds 420 \
            --fail-on-warnings

      - name: Detect global map cache key
        if: matrix.buildtype == 'linux-release' && inputs.run_global_smoke
        id: global-map
        shell: bash
        run: |
          set -euo pipefail
          map_url="$(grep -E '^mapDownloadUrl[[:space:]]*=' config.lua.dist | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ -z "${map_url}" ]]; then
            echo "mapDownloadUrl not found in config.lua.dist" >&2
            exit 1
          fi
          map_hash="$(printf '%s' "${map_url}" | sha256sum | cut -c1-16)"
          echo "url=${map_url}" >> "$GITHUB_OUTPUT"
          echo "key=canary-global-map-${map_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore global map cache
        if: matrix.buildtype == 'linux-release' && inputs.run_global_smoke
        id: restore-global-map
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/canary-maps/otservbr.otbm
          key: ${{ steps.global-map.outputs.key }}

      - name: Smoke test Global datapack runtime
        if: matrix.buildtype == 'linux-release' && inputs.run_global_smoke
        run: |
          python3 .github/scripts/smoke_test_canary.py \
            --binary-path build/${{ matrix.buildtype }}/bin/canary \
            --data-pack data-otservbr-global \
            --map-name otservbr \
            --map-download-url "${{ steps.global-map.outputs.url }}" \
            --map-cache-path .cache/canary-maps/otservbr.otbm \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --db-user root \
            --db-password root \
            --db-name canary_smoke_${{ matrix.buildtype }}_global \
            --login-port 7371 \
            --game-port 7372 \
            --status-port 7371 \
            --startup-timeout-seconds 900 \
            --fail-on-warnings

      - name: Save global map cache
        if: matrix.buildtype == 'linux-release' && inputs.run_global_smoke && steps.restore-global-map.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/canary-maps/otservbr.otbm
          key: ${{ steps.global-map.outputs.key }}

      - name: Import Database Schema
        if: matrix.buildtype == 'linux-debug'
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -u root -proot canary_test < schema.sql
          mysql -h 127.0.0.1 -u root -proot canary_test < docker/data/01-test_account.sql
          mysql -h 127.0.0.1 -u root -proot canary_test < docker/data/02-test_account_players.sql

      - name: Run Tests
        if: matrix.buildtype == 'linux-debug'
        env:
          TEST_DB_USER: root
          TEST_DB_PASSWORD: root
          TEST_DB_NAME: canary_test
          TEST_DB_ALLOW_RESET: "1"
          GTEST_OUTPUT: xml:build/${{ matrix.buildtype }}/test-logs/gtest/
        run: |
          set -o pipefail
          mkdir -p build/${{ matrix.buildtype }}/test-logs
          echo "=== Focused DB smoke (raw canary_it) ==="
          GTEST_OUTPUT="xml:build/${{ matrix.buildtype }}/test-logs/gtest-smoke/" \
            build/${{ matrix.buildtype }}/tests/integration/canary_it \
            --gtest_filter=PlayerStorageRepositoryDBTest.Upsert \
            --gtest_also_run_disabled_tests \
            2>&1 | tee build/${{ matrix.buildtype }}/test-logs/canary-it-smoke.log
          echo "=== Focused bootstrap smoke (raw canary_it) ==="
          GTEST_OUTPUT="xml:build/${{ matrix.buildtype }}/test-logs/gtest-bootstrap-smoke/" \
            build/${{ matrix.buildtype }}/tests/integration/canary_it \
            --gtest_filter=RsaIntegrationTest.StartLoadsPemAndDecryptsFallbackCompatibleBlock \
            --gtest_also_run_disabled_tests \
            2>&1 | tee build/${{ matrix.buildtype }}/test-logs/canary-it-bootstrap-smoke.log
          ctest --test-dir build/${{ matrix.buildtype }} -N
          ctest --test-dir build/${{ matrix.buildtype }} \
            --output-on-failure \
            --verbose \
            --parallel 2 \
            2>&1 | tee build/${{ matrix.buildtype }}/test-logs/ctest-linux-debug.log

      - name: Summarize test failure
        if: matrix.buildtype == 'linux-debug' && failure()
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          candidates = [
              Path("build/${{ matrix.buildtype }}/Testing/Temporary/LastTest.log"),
              Path("build/${{ matrix.buildtype }}/test-logs/canary-it-smoke.log"),
              Path("build/${{ matrix.buildtype }}/test-logs/canary-it-bootstrap-smoke.log"),
              Path("build/${{ matrix.buildtype }}/test-logs/ctest-linux-debug.log"),
          ]
          parts = []
          for path in candidates:
              if not path.exists():
                  continue
              text = path.read_text(errors="replace")
              lines = text.splitlines()
              failed = [line for line in lines if "***Failed" in line or "[  FAILED  ]" in line or "FAILED TEST" in line]
              tail = lines[-120:]
              parts.append(f"## {path}\n")
              if failed:
                  parts.append("Failed lines:\n" + "\n".join(failed[-40:]) + "\n")
              parts.append("Tail:\n" + "\n".join(tail))

          gtest_dir = Path("build/${{ matrix.buildtype }}/test-logs/gtest")
          if gtest_dir.exists():
              failures = []
              for path in sorted(gtest_dir.rglob("*.xml")):
                  text = path.read_text(errors="replace")
                  if "<failure" in text or 'failures="0"' not in text:
                      failures.append(f"## {path}\n{text[:4000]}")
              if failures:
                  parts.append("GoogleTest XML failures:\n" + "\n\n".join(failures[:10]))

          message = "\n\n".join(parts) if parts else "CTest failed, but no CTest log files were found."
          message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=CTest linux-debug failure::{message}")
          PY

      - name: Upload test logs
        if: matrix.buildtype == 'linux-debug' && always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-debug-test-logs
          path: |
            build/${{ matrix.buildtype }}/test-logs/
            build/${{ matrix.buildtype }}/Testing/Temporary/LastTest.log

      - name: Upload runtime smoke logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.buildtype }}-runtime-smoke-logs
          path: build/runtime-smoke-logs/
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.buildtype }}
          path: build/${{ matrix.buildtype }}/bin/

      - name: Verify vcpkg binary cache push
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          found_logs=false
          while IFS= read -r -d '' log; do
            found_logs=true
            if grep -q "to 0 binary cache(s)" -- "$log"; then
              echo "Binary cache push reported 0 caches." >&2
              exit 1
            fi
          done < <(find . -name "vcpkg-manifest-install.log" -print0)

          if [[ "${found_logs}" != true ]]; then
            echo "No vcpkg manifest logs found." >&2
            exit 1
          fi
