name: Reusable Windows Build

on:
  workflow_call:
    inputs:
      run_canary_smoke:
        description: Run the data-canary runtime smoke test.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Compile (${{ matrix.type }})
    strategy:
      fail-fast: false
      matrix:
        type: [CMake, Solution]
    runs-on: windows-2025
    env:
      # Use GitHub Packages as a read-only vcpkg cache for PRs.
      # Only push/write binary cache on direct pushes to main, where GITHUB_TOKEN can have packages: write.
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'readwrite' || 'read' }};nugettimeout,600"
      VCPKG_NUGET_API_KEY: ${{ github.token }}
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
    steps:
      - name: Install VS 2026 Build Tools (v145 toolset)
        if: matrix.type == 'Solution'
        shell: pwsh
        run: |
          choco install visualstudio2026-workload-vctools --yes --ignore-package-exit-codes=3010

      - name: Setup MSBuild.exe
        if: matrix.type == 'Solution'
        uses: microsoft/setup-msbuild@v3
        with:
          vs-prerelease: true
          vs-version: "latest"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get vcpkg baseline
        shell: pwsh
        run: |
          $json = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $vcpkgCommitId = $json.'builtin-baseline'
          "VCPKG_GIT_COMMIT_ID=$vcpkgCommitId" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Remove Windows pre-installed MySQL
        if: matrix.type == 'CMake'
        shell: pwsh
        run: Remove-Item -Recurse -Force C:\mysql* -ErrorAction SilentlyContinue

      - name: Prepare sccache directory
        if: matrix.type == 'CMake'
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:SCCACHE_DIR | Out-Null

      - name: CCache
        if: matrix.type == 'CMake'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          max-size: "1G"
          variant: "sccache"
          key: ccache-windows-release
          restore-keys: |
            ccache-windows

      # IMPORTANT: configure the nuget.exe that MSBuild/vcpkg.targets actually uses (Chocolatey).
      # Use github.token directly so a stale or invalid VCPKG_PACKAGES_TOKEN secret cannot override it.
      - name: Setup NuGet source for GitHub Packages (for MSBuild/vcpkg.targets)
        shell: pwsh
        env:
          NUGET_AUTH_TOKEN: ${{ github.token }}
        run: |
          $feed = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          $nuget = (Get-Command nuget.exe -ErrorAction SilentlyContinue).Source
          if (-not $nuget) { throw "nuget.exe not found in PATH" }

          & $nuget sources remove -Name "GitHubPackages" | Out-Null 2>$null
          & $nuget sources add `
            -Name "GitHubPackages" `
            -Source $feed `
            -UserName "${{ github.repository_owner }}" `
            -Password "$env:NUGET_AUTH_TOKEN" `
            -StorePasswordInClearText

          & $nuget setapikey "$env:NUGET_AUTH_TOKEN" -Source $feed

          & $nuget sources list

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # For Solution builds, keep vcpkg inside repo to match your msbuild /p:VcpkgRoot
          vcpkgDirectory: ${{ matrix.type == 'Solution' && format('{0}/vcpkg', github.workspace) || '' }}
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Run CMake
        if: matrix.type == 'CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: windows-release
          buildPreset: windows-release
          configurePresetAdditionalArgs: "['-DTOGGLE_BIN_FOLDER=ON']"

      - name: Install MariaDB for smoke test
        if: matrix.type == 'CMake' && inputs.run_canary_smoke
        shell: pwsh
        run: |
          choco install mariadb.install --version=12.2.2 --yes --no-progress --install-arguments="'SERVICENAME=MariaDB PASSWORD=root PORT=3306 UTF8=1'"

          $mysqlBin = Get-ChildItem -Path "C:\Program Files\MariaDB*\bin\mysql.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $mysqlBin) {
            throw "mysql.exe was not found after MariaDB install"
          }

          Split-Path $mysqlBin.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $mysqlAdmin = Join-Path (Split-Path $mysqlBin.FullName) "mysqladmin.exe"
          for ($i = 0; $i -lt 60; $i++) {
            & $mysqlAdmin --user=root --password=root --host=127.0.0.1 --port=3306 --protocol=tcp ping
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            Start-Sleep -Seconds 2
          }

          throw "MariaDB did not become reachable"

      - name: Smoke test Canary datapack runtime
        if: matrix.type == 'CMake' && inputs.run_canary_smoke
        shell: pwsh
        run: |
          python .github/scripts/smoke_test_canary.py `
            --binary-path build/windows-release/bin/canary.exe `
            --data-pack data-canary `
            --map-name canary `
            --db-host 127.0.0.1 `
            --db-port 3306 `
            --db-user root `
            --db-password root `
            --db-name canary_smoke_windows_canary `
            --login-port 7571 `
            --game-port 7572 `
            --status-port 7571 `
            --startup-timeout-seconds 420 `
            --fail-on-warnings

      - name: Upload runtime smoke logs
        if: matrix.type == 'CMake' && always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-cmake-runtime-smoke-logs
          path: build/runtime-smoke-logs/
          if-no-files-found: ignore

      - name: Upload artifacts (CMake)
        if: matrix.type == 'CMake'
        uses: actions/upload-artifact@v7
        with:
          name: windows-cmake-release
          path: build/windows-release/bin/

      - name: Build project (MSBuild)
        if: matrix.type == 'Solution'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path (Get-Location) "vcpkg"
          $outDir = Join-Path (Get-Location) "artifacts"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          msbuild.exe vcproj/canary.sln `
            /m `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgRoot="$vcpkgRoot" `
            /p:OutDir="$outDir\\" `
            /p:GITHUB_WORKSPACE="${{ github.workspace }}"

      - name: Verify vcpkg binary cache push
        if: matrix.type == 'CMake' && success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $logs = Get-ChildItem -Path . -Recurse -Filter vcpkg-manifest-install.log -ErrorAction SilentlyContinue
          if (-not $logs) {
            Write-Error "No vcpkg manifest logs found."
            exit 1
          }
          foreach ($log in $logs) {
            if (Select-String -Path $log.FullName -Pattern "to 0 binary cache\(s\)") {
              Write-Error "Binary cache push reported 0 caches."
              exit 1
            }
          }

      - name: Upload artifacts
        if: matrix.type == 'Solution'
        uses: actions/upload-artifact@v7
        with:
          name: windows-solution-debug
          path: artifacts/
