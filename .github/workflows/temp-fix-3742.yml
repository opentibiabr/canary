name: temp-fix-3742

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/issue-3742-store-disable-reasons'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch duplicate disable reasons
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('data/libs/gamestore/senders.lua')
          text = path.read_text()
          old = '''\t\tlocal canBuy = player:canBuyOffer(offer)\n\t\tif canBuy.disabled == 1 then\n\t\t\tfor index, disableTable in ipairs(disableReasons) do\n\t\t\t\tif canBuy.disabledReason == disableTable.reason then\n\t\t\t\t\toffer.disabledReadonIndex = index\n\t\t\t\tend\n\t\t\tend\n\n\t\t\tif offer.disabledReadonIndex == nil then\n\t\t\t\toffer.disabledReadonIndex = #disableReasons\n\t\t\t\ttable.insert(disableReasons, canBuy.disabledReason)\n\t\t\tend\n\t\tend'''
          new = '''\t\tlocal canBuy = player:canBuyOffer(offer)\n\t\toffer.disabledReadonIndex = nil\n\t\tif canBuy.disabled == 1 then\n\t\t\tfor index, reason in ipairs(disableReasons) do\n\t\t\t\tif canBuy.disabledReason == reason then\n\t\t\t\t\toffer.disabledReadonIndex = index - 1\n\t\t\t\t\tbreak\n\t\t\t\tend\n\t\t\tend\n\n\t\t\tif offer.disabledReadonIndex == nil then\n\t\t\t\ttable.insert(disableReasons, canBuy.disabledReason)\n\t\t\t\toffer.disabledReadonIndex = #disableReasons - 1\n\t\t\tend\n\t\tend'''
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'expected 2 matching blocks, found {count}')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/libs/gamestore/senders.lua
          git commit -m "fix: deduplicate GameStore disable reasons"
          git push origin HEAD:${{ github.head_ref }}
