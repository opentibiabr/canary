---
name: Temporary House Wrap Fix

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/issue-3609-house-wrap-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply the focused house transfer fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/map/house/house.cpp')
          text = path.read_text(encoding='utf-8')

          if 'std::unordered_set<const Item*> processedItems;' in text:
              print('House wrap fix is already applied.')
              raise SystemExit(0)

          replacements = [
              (
                  '''\tItemList moveItemList;\n\tif (const TileItemVector* items = tile->getItemList()) {\n\t\tfor (const auto &item : *items) {\n\t\t\tif (item->isWrapable()) {''',
                  '''\tItemList moveItemList;\n\tif (const TileItemVector* items = tile->getItemList()) {\n\t\tconst auto itemsSnapshot = *items;\n\t\tfor (const auto &item : itemsSnapshot) {\n\t\t\tif (!item || item->getParent().get() != tile.get()) {\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\tif (item->isWrapable()) {''',
              ),
              (
                  '''\tstd::unordered_set<std::shared_ptr<Player>> playersToSave = { player };\n\tfor (const auto &item : moveItemList) {\n\t\tstd::shared_ptr<Player> targetPlayer = player;''',
                  '''\tstd::unordered_set<std::shared_ptr<Player>> playersToSave = { player };\n\tstd::unordered_set<const Item*> processedItems;\n\tfor (const auto &item : moveItemList) {\n\t\tif (!item || !processedItems.insert(item.get()).second) {\n\t\t\tcontinue;\n\t\t}\n\n\t\tstd::shared_ptr<Player> targetPlayer = player;''',
              ),
              (
                  '''\tconst auto &newItem = g_game().wrapItem(item, houseTile->getHouse());\n\tif (newItem->isRemoved() && !newItem->getParent()) {\n\t\tg_logger().warn("[{}] item removed during wrapping - check ground type - player name: {} item id: {} position: {}", __FUNCTION__, player->getName(), item->getID(), houseTile->getPosition().toString());''',
                  '''\tconst auto originalItemId = item->getID();\n\tconst auto &newItem = g_game().wrapItem(item, houseTile->getHouse());\n\tif (!newItem || newItem->isRemoved() || !newItem->getParent()) {\n\t\tg_logger().warn("[{}] item removed during wrapping - check ground type - player name: {} item id: {} position: {}", __FUNCTION__, player->getName(), originalItemId, houseTile->getPosition().toString());''',
              ),
              (
                  '''\tfor (const auto &item : container->getItemList()) {\n\t\tif (!item) {\n\t\t\tcontinue;\n\t\t}''',
                  '''\tconst auto itemsSnapshot = container->getItemList();\n\tfor (const auto &item : itemsSnapshot) {\n\t\tif (!item || item->getParent().get() != container.get()) {\n\t\t\tcontinue;\n\t\t}''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one exact match, found {count}: {old.splitlines()[0]}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit the source change
        shell: bash
        run: |
          if git diff --quiet -- src/map/house/house.cpp; then
            echo 'No source change to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/map/house/house.cpp
          git commit -m 'fix: stabilize house wrap transfer iteration'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
