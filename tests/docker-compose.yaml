version: "3.3"

services:
  otdb-test:
    container_name: otdb-test
    build:
      context: ../
      dockerfile: ./tests/Dockerfile.database
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=canary_test
      - MYSQL_USER=otserver
      - MYSQL_PASSWORD=otserver
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
